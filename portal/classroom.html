<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIPS Portal — Classroom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css?v=3" />
  <style>
    #jitsi{height:calc(100vh - 58px);width:100%}
    .cbar{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .cbar .info{font-family:'Outfit',sans-serif;font-weight:600}
  </style>
</head>
<body>
  <div class="cbar">
    <div class="info" id="title">Loading class…</div>
    <div><a class="btn ghost sm" id="back">← Leave</a></div>
  </div>
  <div id="jitsi"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://8x8.vc/external_api.js"></script>
  <script src="config.js"></script>
  <script>
    (async () => {
      const session = await requireAuth();
      const profile = await getProfile();
      const params = new URLSearchParams(location.search);
      const batchId = params.get("batch");
      if (!batchId) { alert("No batch specified."); history.back(); return; }

      const isTeacher = profile.role === "teacher" || profile.role === "admin";
      document.getElementById("back").href = isTeacher ? "teacher.html" : "student.html";
      if (profile.role === "admin") document.getElementById("back").href = "admin.html";

      // Ask the Edge Function for a JaaS token. It re-checks access server-side
      // and decides moderator (teacher/admin) vs guest (paid student).
      let tok;
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/jaas-token?batch=${batchId}`, {
          headers: { Authorization: `Bearer ${session.access_token}` }
        });
        tok = await res.json();
        if (!res.ok) throw new Error(tok.error || "Could not join");
      } catch (e) {
        alert("Unable to join this class: " + e.message);
        location.href = document.getElementById("back").href;
        return;
      }

      document.getElementById("title").textContent = tok.room;

      // Log the session start (teacher/admin only — RLS blocks students).
      if (isTeacher) {
        sb.from("sessions").insert({ batch_id: batchId, title: tok.room, created_by: profile.id }).then(()=>{});
      }

      const api = new JitsiMeetExternalAPI("8x8.vc", {
        roomName: `${tok.appId}/${tok.room}`,
        jwt: tok.jwt,
        parentNode: document.getElementById("jitsi"),
        userInfo: { displayName: tok.name || profile.full_name },
        configOverwrite: {
          startWithAudioMuted: !tok.moderator,
          prejoinPageEnabled: false
        },
        interfaceConfigOverwrite: {
          TOOLBAR_BUTTONS: tok.moderator
            ? ['microphone','camera','desktop','chat','raisehand','tileview','recording','hangup','settings']
            : ['microphone','camera','chat','raisehand','tileview','hangup']
        }
      });

      api.addEventListener("readyToClose", () => { location.href = document.getElementById("back").href; });
    })();
  </script>
</body>
</html>
