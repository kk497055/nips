<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIPS Portal — Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css?v=6" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a5336" />
  <link rel="apple-touch-icon" href="../assets/nips-logo.png" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><img src="../assets/nips-logo-1.png" alt="NIPS" onerror="this.style.display='none'"/> NIPS Portal</div>
    <div class="right">
      <span id="who"></span><span class="badge">Student</span>
      <button class="btn ghost sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div class="student-head">
      <div>
        <p class="eyebrow">Student Dashboard</p>
        <h1>My Classes</h1>
        <p class="sub">Join live sessions and view past recordings for batches you're enrolled in.</p>
      </div>
      <div class="support-chip">
        <span>Need help?</span>
        <a href="https://wa.me/923215554125" target="_blank">Message NIPS</a>
      </div>
    </div>

    <div id="live-banner"></div>
    <div id="progress"></div>

    <div class="section">
      <div id="batches" class="grid"><p class="empty">Loading…</p></div>
    </div>

    <div id="fees"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=5"></script>
  <script>
    (async () => {
      await requireAuth();
      const p = await getProfile();
      if (!p) {
        document.getElementById("batches").innerHTML =
          '<p class="empty">We couldn\'t load your profile. Please log out and back in, or contact NIPS support.</p>';
        return;
      }
      if (p.role !== "student") return routeByRole(p.role);
      document.getElementById("who").textContent = p.full_name + " ";
      window._sid = p.id;
      window._seenTs = p.dashboard_seen_at ? new Date(p.dashboard_seen_at).getTime() : null;

      // Live "class is on now" banner + realtime updates.
      refreshLive();
      sb.channel("live-sessions")
        .on("postgres_changes", { event: "*", schema: "public", table: "sessions" }, refreshLive)
        .subscribe();

      renderProgress();

      // RLS returns only batches where this student is PAID + enrolled.
      const [{ data: batches }, { data: enrollments }] = await Promise.all([
        sb.from("batches").select("*").eq("is_active", true),
        sb.from("enrollments").select("payment_status")
      ]);
      const box = document.getElementById("batches");

      if (!batches || !batches.length) {
        const hasPending = (enrollments || []).some(e => e.payment_status === "pending");
        box.className = "student-empty-wrap";
        box.innerHTML = `
          <div class="student-empty">
            <div class="empty-mark">
              <img src="../assets/nips-logo-1.png" alt="NIPS" onerror="this.style.display='none'"/>
            </div>
            <div>
              <p class="eyebrow">${hasPending ? "Payment Review" : "Account Ready"}</p>
              <h2>${hasPending ? "Your enrolment is being confirmed" : "No active classes yet"}</h2>
              <p class="empty-lead">${hasPending
                ? "Your account is verified and your enrolment is in progress. Classes will appear here as soon as payment is marked paid by the NIPS team."
                : "Your account is verified. Once the team enrols you and confirms payment, your live classes and recordings will appear here."}</p>
              <div class="progress-row">
                <div class="progress-step done"><span>1</span><strong>Email verified</strong></div>
                <div class="progress-step ${hasPending ? "active" : ""}"><span>2</span><strong>Payment confirmation</strong></div>
                <div class="progress-step"><span>3</span><strong>Class access</strong></div>
              </div>
              <div class="empty-actions">
                <a class="btn green" href="https://wa.me/923215554125" target="_blank">Contact Support</a>
                <a class="btn soft" href="../contact.html">Admissions Help</a>
              </div>
            </div>
          </div>`;
        return;
      }

      box.innerHTML = "";
      for (const b of batches) {
        const { data: recs } = await sb.from("sessions")
          .select("title,started_at,recording_url").eq("batch_id", b.id)
          .not("recording_url","is",null).order("started_at",{ascending:false}).limit(5);

        const recHtml = (recs && recs.length)
          ? recs.map(r => `<div class="recording-link"><span>Video</span><a href="${safeUrl(r.recording_url)}" target="_blank" rel="noopener noreferrer">${new Date(r.started_at).toLocaleDateString()} — ${esc(r.title||'Session')}</a></div>`).join("")
          : '<div class="recording-empty">No recordings yet</div>';

        const { data: mats } = await sb.from("materials")
          .select("id,title,storage_path,created_at").eq("batch_id", b.id).order("created_at",{ascending:false});
        const matHtml = (mats && mats.length)
          ? mats.map(m => `<div class="recording-link"><span>File</span><a href="#" onclick="downloadMaterial('${m.storage_path.replace(/'/g,"\\'")}');return false;">${esc(m.title)}</a></div>`).join("")
          : '<div class="recording-empty">No materials yet</div>';

        const { data: asgs } = await sb.from("assignments")
          .select("id,title,instructions,due_date,created_at").eq("batch_id", b.id).order("created_at",{ascending:false});
        const { data: mySubs } = await sb.from("submissions").select("assignment_id,storage_path,grade,feedback");
        const subOf = Object.fromEntries((mySubs||[]).map(s=>[s.assignment_id,s]));
        const asgHtml = (asgs && asgs.length)
          ? asgs.map(a => {
              const s = subOf[a.id];
              const status = s
                ? (s.grade ? `<span class="pill paid">Graded: ${esc(s.grade)}</span>${s.feedback?` <span class="meta">${esc(s.feedback)}</span>`:''}`
                           : '<span class="pill pending">Submitted</span>')
                : '<span class="meta">Not submitted</span>';
              return `<div class="recording-link" style="flex-direction:column;align-items:stretch;gap:6px">
                <div><strong>${esc(a.title)}</strong>${a.due_date?` <span class="meta">· due ${a.due_date}</span>`:''} ${status}</div>
                ${a.instructions?`<div class="meta">${esc(a.instructions)}</div>`:''}
                <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                  <input type="file" id="sf-${a.id}" style="font-size:12px"/>
                  <button class="btn green sm" onclick="submitAssignment('${a.id}')">${s?'Resubmit':'Submit'}</button>
                  ${s?.storage_path?`<a class="btn sm" href="#" onclick="downloadSubmission('${s.storage_path.replace(/'/g,"\\'")}');return false;">My file</a>`:''}
                </div>
              </div>`;
            }).join("")
          : '<div class="recording-empty">No assignments yet</div>';

        const { data: quizzes } = await sb.from("quizzes").select("id,title,created_at").eq("batch_id", b.id).order("created_at",{ascending:false});
        const { data: myAtt } = await sb.from("quiz_attempts").select("quiz_id,score,total").eq("student_id", window._sid);
        const attOf = Object.fromEntries((myAtt||[]).map(a=>[a.quiz_id,a]));
        const quizHtml = (quizzes && quizzes.length)
          ? quizzes.map(q => { const a = attOf[q.id];
              return `<div class="recording-link" style="justify-content:space-between">
                <span>📝 ${esc(q.title)} ${a?`<span class="pill paid">${a.score}/${a.total}</span>`:''}</span>
                <button class="btn green sm" onclick="openQuiz('${q.id}')">${a?'Retake':'Take'}</button></div>`; }).join("")
          : '<div class="recording-empty">No quizzes yet</div>';

        // "New since last visit" — count items created after the last dashboard view.
        let newCount = 0;
        if (window._seenTs) {
          const after = (d) => d && new Date(d).getTime() > window._seenTs;
          newCount = (mats||[]).filter(m=>after(m.created_at)).length
                   + (asgs||[]).filter(a=>after(a.created_at)).length
                   + (quizzes||[]).filter(q=>after(q.created_at)).length
                   + (recs||[]).filter(r=>after(r.started_at)).length;
        }
        const newBadge = newCount > 0 ? `<span class="pill pending">${newCount} new</span>` : "";

        box.innerHTML += `
          <div class="card class-card">
            <div class="class-top">
              <span class="pill paid">Active</span>
              <span class="class-category">${esc(b.category||'NIPS Class')} ${newBadge}</span>
            </div>
            <h3>${esc(b.name)}</h3>
            <div class="meta">${esc(b.schedule||'Schedule TBA')}</div>
            <div class="row-actions">
              <a class="btn green" href="classroom.html?batch=${b.id}">Join Live Class</a>
              <button class="btn soft" onclick="openQA('${b.id}','${esc(b.name).replace(/'/g,"&#39;")}')">Q&amp;A</button>
            </div>
            <div class="recordings"><strong>Materials</strong>${matHtml}</div>
            <div class="recordings"><strong>Assignments</strong>${asgHtml}</div>
            <div class="recordings"><strong>Quizzes</strong>${quizHtml}</div>
            <div class="recordings"><strong>Recordings</strong>${recHtml}</div>
          </div>`;
      }

      // Mark the dashboard as seen so next visit's "new" badges reset.
      sb.from("profiles").update({ dashboard_seen_at: new Date().toISOString() }).eq("id", window._sid).then(()=>{});

      renderFees();
    })();

    async function renderFees() {
      const { data: pays } = await sb.from("payments").select("*").order("paid_on", { ascending: false });
      const el = document.getElementById("fees");
      if (!pays || !pays.length) { el.innerHTML = ""; return; }
      window._pays = Object.fromEntries(pays.map(p => [p.id, p]));
      const total = pays.reduce((s, p) => s + Number(p.amount || 0), 0);
      el.innerHTML = `<div class="section"><h2>My Fees</h2>
        <table><thead><tr><th>Date</th><th>Amount</th><th>Note</th><th>Receipt</th></tr></thead><tbody>
        ${pays.map(p => `<tr>
          <td>${new Date(p.paid_on).toLocaleDateString()}</td>
          <td>PKR ${Number(p.amount||0).toLocaleString()}</td>
          <td>${esc(p.note||'Fee payment')}</td>
          <td><button class="btn sm" onclick="printReceipt('${p.id}')">Receipt</button></td>
        </tr>`).join("")}
        <tr><td><strong>Total</strong></td><td colspan="3"><strong>PKR ${total.toLocaleString()}</strong></td></tr>
        </tbody></table></div>`;
    }

    function printReceipt(id) {
      const p = (window._pays || {})[id];
      if (!p) return;
      const who = document.getElementById("who").textContent.trim();
      const w = window.open("", "_blank", "width=520,height=640");
      w.document.write(`<html><head><title>NIPS Receipt</title></head>
        <body style="font-family:Arial,sans-serif;color:#1a1a1a;padding:28px;max-width:480px;margin:0 auto">
        <div style="background:#1a5336;color:#fff;padding:18px 20px;border-radius:10px">
          <div style="font-size:18px;font-weight:bold">NIPS Education Solutions</div>
          <div style="font-size:11px;opacity:.85">Payment Receipt</div></div>
        <table style="width:100%;margin-top:18px;font-size:14px;border-collapse:collapse">
          <tr><td style="padding:8px 0;color:#6b7280">Student</td><td style="text-align:right">${esc(who)}</td></tr>
          <tr><td style="padding:8px 0;color:#6b7280">Date</td><td style="text-align:right">${new Date(p.paid_on).toLocaleString()}</td></tr>
          <tr><td style="padding:8px 0;color:#6b7280">Note</td><td style="text-align:right">${esc(p.note||'Fee payment')}</td></tr>
          <tr><td style="padding:14px 0;font-size:18px;font-weight:bold">Amount</td><td style="text-align:right;font-size:18px;font-weight:bold">PKR ${Number(p.amount||0).toLocaleString()}</td></tr>
        </table>
        <p style="color:#9ca3af;font-size:11px;margin-top:18px">K Block, Johar Town, Lahore · +92 321 5554125 · This is a system-generated receipt.</p>
        <script>window.onload=function(){window.print()}<\/script></body></html>`);
      w.document.close();
    }

    async function renderProgress() {
      const [{ data: att }, { data: asg }, { data: subs }, { data: recs }] = await Promise.all([
        sb.from("attendance").select("status,session_date"),
        sb.from("assignments").select("id"),
        sb.from("submissions").select("grade"),
        sb.from("sessions").select("id").not("recording_url", "is", null)
      ]);
      const el = document.getElementById("progress");
      const total = (att || []).length, present = (att || []).filter(a => a.status === "present").length;
      const submitted = (subs || []).length, graded = (subs || []).filter(s => s.grade).length;
      if (!((att || []).length || (asg || []).length || (recs || []).length)) { el.innerHTML = ""; return; }
      const attRate = total ? Math.round(present / total * 100) : null;

      // Current attendance streak: trailing consecutive 'present' by date.
      let streak = 0;
      const sorted = [...(att || [])].sort((a, b) => (a.session_date < b.session_date ? -1 : 1));
      for (let i = sorted.length - 1; i >= 0; i--) { if (sorted[i].status === "present") streak++; else break; }
      const streakLabel = streak >= 3 ? `🔥 ${streak}` : String(streak);

      el.innerHTML = `<div class="section"><h2>My Progress</h2><div class="stats">
        <div class="stat"><div class="num">${attRate === null ? '—' : attRate + '%'}</div><div class="lbl">Attendance</div><div class="hint">${present}/${total} classes</div></div>
        <div class="stat"><div class="num">${streakLabel}</div><div class="lbl">Streak</div><div class="hint">classes in a row</div></div>
        <div class="stat"><div class="num">${submitted}</div><div class="lbl">Submitted</div><div class="hint">${graded} graded</div></div>
        <div class="stat"><div class="num">${(asg || []).length}</div><div class="lbl">Assignments</div></div>
        <div class="stat"><div class="num">${(recs || []).length}</div><div class="lbl">Recordings</div></div>
      </div></div>`;
    }

    async function refreshLive() {
      const since = new Date(Date.now() - 3 * 3600 * 1000).toISOString();
      const { data: live } = await sb.from("sessions")
        .select("batch_id,started_at").is("ended_at", null).gt("started_at", since);
      const el = document.getElementById("live-banner");
      if (!live || !live.length) { el.innerHTML = ""; return; }
      const ids = [...new Set(live.map(s => s.batch_id))];
      const { data: bs } = await sb.from("batches").select("id,name").in("id", ids);
      const nameOf = Object.fromEntries((bs || []).map(b => [b.id, b.name]));
      el.innerHTML = ids.map(id => `<div class="live-banner">
        <span class="live-dot"></span>
        <span><strong>${esc(nameOf[id] || 'Your class')}</strong> is live now</span>
        <a class="btn green sm" href="classroom.html?batch=${id}">Join now</a>
      </div>`).join("");
    }

    async function openSigned(bucket, path) {
      const { data, error } = await sb.storage.from(bucket).createSignedUrl(path, 120);
      if (error) return alert("Could not open file: " + error.message);
      window.open(data.signedUrl, "_blank");
    }
    const downloadMaterial = (path) => openSigned("materials", path);
    const downloadSubmission = (path) => openSigned("submissions", path);

    async function submitAssignment(assignmentId) {
      const input = document.getElementById("sf-" + assignmentId);
      const file = input.files[0];
      if (!file) return alert("Choose a file to submit.");
      if (file.size > 50 * 1024 * 1024) return alert("File too large (max 50 MB).");
      const safe = file.name.replace(/[^a-zA-Z0-9._-]+/g, "_");
      const path = `${assignmentId}/${window._sid}/${crypto.randomUUID()}-${safe}`;
      const up = await sb.storage.from("submissions").upload(path, file);
      if (up.error) return alert("Upload failed: " + up.error.message);
      const { error } = await sb.from("submissions").upsert(
        { assignment_id: assignmentId, student_id: window._sid, storage_path: path,
          file_type: file.type, size_bytes: file.size, submitted_at: new Date().toISOString(),
          grade: null, feedback: null, graded_by: null, graded_at: null },
        { onConflict: "assignment_id,student_id" }
      );
      if (error) return alert("Saved file but record failed: " + error.message);
      alert("Submitted! Your teacher will review it.");
      location.reload();
    }
  </script>
</body>
</html>
